kind = "web"
previewPath = "/"
title = "EverydayAI"
version = "1.0.0"
id = "artifacts/everydayai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25059

[services.development]
run = "pnpm --filter @workspace/everydayai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/everydayai", "run", "build" ]
publicDir = "artifacts/everydayai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25059"
BASE_PATH = "/"
