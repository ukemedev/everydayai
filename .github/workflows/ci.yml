# ─── ci.yml ──────────────────────────────────────────────────────
# EverydayAI — Continuous Integration Pipeline
# ─────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-zod
        working-directory: lib/api-zod
        run: pnpm build

      - name: TypeScript typecheck
        run: pnpm run typecheck

      - name: Run tests
        working-directory: artifacts/api-server
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://fake-user:fake-pass@localhost:5432/fake-db
          SESSION_SECRET: this-is-a-fake-secret-32-chars-min
          VITE_SUPABASE_URL: https://fake.supabase.co
          VITE_SUPABASE_ANON_KEY: fake-anon-key-for-testing-only
          PORT: "3000"
        run: pnpm test
